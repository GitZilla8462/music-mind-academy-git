<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#111827"/>
  <text x="960" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">Viewing Party</text>
  <text x="960" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="#D1D5DB">We will watch every film score back to back</text>
  <text x="960" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="#D1D5DB">No commentary during -- just watch like an audience</text>
  <text x="960" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="#D1D5DB">Applause after each one</text>
</svg>