<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg8)"/>

  <text x="960" y="120" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="64" font-weight="bold">Your Mission</text>
  <text x="960" y="180" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="28">Create a leitmotif for your character</text>

  <text x="960" y="300" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="bold">3 Steps:</text>

  <rect x="260" y="360" width="440" height="280" rx="16" fill="#3b82f620" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="420" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="48" font-weight="bold">1</text>
  <text x="480" y="480" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Pick a Character</text>
  <text x="480" y="520" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Hero, Villain, Romantic,</text>
  <text x="480" y="550" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">or Sneaky</text>
  <text x="480" y="600" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Name them and describe them</text>

  <rect x="740" y="360" width="440" height="280" rx="16" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="2"/>
  <text x="960" y="420" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="48" font-weight="bold">2</text>
  <text x="960" y="480" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Pick an Instrument</text>
  <text x="960" y="520" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Strings, Woodwind, or Brass</text>
  <text x="960" y="560" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Which sound matches</text>
  <text x="960" y="590" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">your character?</text>

  <rect x="1220" y="360" width="440" height="280" rx="16" fill="#10b98120" stroke="#10b981" stroke-width="2"/>
  <text x="1440" y="420" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="48" font-weight="bold">3</text>
  <text x="1440" y="480" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Record Your Theme</text>
  <text x="1440" y="520" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Play 4-8 notes on</text>
  <text x="1440" y="550" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">the keyboard</text>
  <text x="1440" y="600" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">Your motif auto-saves!</text>

  <text x="960" y="760" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="32">Your classmates will try to guess your character type!</text>
  <text x="960" y="820" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="28">Make it obvious - use what you learned!</text>
</svg>
